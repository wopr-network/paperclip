name: Docker Managed Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.managed"
      - "server/**"
      - "packages/**"
      - "ui/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/docker-managed.yml"
  workflow_dispatch:

concurrency:
  group: docker-managed-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wopr-network/paperclip

jobs:
  build-and-push:
    name: Build & Push Managed Image
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=managed
            type=sha,prefix=managed-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.managed
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
